query getConsignmentDetailsForMetadataReview($consignmentId: UUID!) {
    getConsignment(consignmentid: $consignmentId) {
        consignmentReference,
        seriesName,
        transferringBodyName,
        userid,
        totalClosedRecords,
        includeTopLevelFolder,
        totalFiles,
        consignmentMetadata {
            propertyName
            value
        }
    }
}
