query getFileCheckProgress($consignmentId: UUID!) {
    getConsignment(consignmentid: $consignmentId) {
        allChecksSucceeded
        parentFolder
        consignmentReference
        totalFiles
        files {
            fileStatuses {
                fileId
                statusType
                statusValue
            }
        }
        fileChecks {
            antivirusProgress {
                filesProcessed
            }
            checksumProgress {
                filesProcessed
            }
            ffidProgress {
                filesProcessed
            }
        }
        consignmentStatuses {
            statusType
            value
        }
    }
}
