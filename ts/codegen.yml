overwrite: true
schema: "../src/main/resources/schema.graphql"
documents: "../src/main/graphql/*.graphql"
config:
  scalars:
    Long: number
generates:
  src/index.d.ts:
    plugins:
      - typescript-graphql-files-modules
  src/schema-types.ts:
    plugins:
      - "typescript"
  src/index.ts:
    config:
      importSchemaTypesFrom: "src/schema-types"
    plugins:
      - add:
          content: "export * from './schema-types';"
      - "typescript-operations"
      - "typescript-document-nodes"
  ./graphql.schema.json:
    plugins:
      - "introspection"
